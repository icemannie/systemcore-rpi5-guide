# /dev/mrccan is normally created by a SystemCore-only kernel module on the
# Limelight carrier board. On Pi 5B that module doesn't exist, so MrcCommDaemon
# can't create /dev/mrccan/controldata and /dev/mrccan/matchinfo — the daemon
# crash-loops with "Failed to open control data file", never sets the NT key
# /Netcomm/Control/ServerReady, and the WPILib HAL SIGABRTs the robot program
# ~10s after launch.
d /dev/mrccan 0755 root root -
